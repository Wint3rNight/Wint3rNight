<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 100" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="now building">
  <rect x="0.5" y="0.5" width="1039" height="99" rx="10" fill="#211E28" stroke="#47346E" stroke-width="1"/>

  <!-- pulsing live dot -->
  <circle cx="28" cy="50" r="6" fill="#8658E3">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- label -->
  <text x="44" y="42" font-size="11" fill="#7A7A7A" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">now building</text>

  <!-- repo name -->
  <text x="44" y="62" font-size="18" font-weight="700" fill="#DADADA" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Wint3rNight</text>

  <!-- commit message -->
  <text x="44" y="82" font-size="12" fill="#7A7A7A" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">no recent push events found</text>

  <!-- time ago (right-aligned) -->
  <text x="1012" y="55" font-size="24" font-weight="700" fill="#8658E3" text-anchor="end" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">—</text>
</svg>
