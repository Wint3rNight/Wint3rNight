<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 180" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="tech stack">
  <defs>
    <linearGradient id="cardGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2A2435"/>
      <stop offset="100%" stop-color="#1C1826"/>
    </linearGradient>
  </defs>

  <!--
    Row 1: C++  Vulkan  CUDA  GLSL/HLSL  CMake  Linux
    Row 2: Rust  Python  OpenGL  SPIR-V   RenderDoc  Git
    Each card: 158 wide, 62 tall, 14px gap, 20px left margin
    (158+14)*6 + 20*2 = 1024 + 40 = 1064  → fits in 1100
  -->

  <!-- ── row 1 ── -->

  <!-- C++ -->
  <g transform="translate(20 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#f34b7d"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">C++</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">systems · engine</text>
  </g>

  <!-- Vulkan -->
  <g transform="translate(192 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#AC162C"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Vulkan</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">graphics api</text>
  </g>

  <!-- CUDA -->
  <g transform="translate(364 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#76b900"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">CUDA</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">gpu compute</text>
  </g>

  <!-- GLSL / HLSL -->
  <g transform="translate(536 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#5686a5"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">GLSL · HLSL</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">shaders</text>
  </g>

  <!-- CMake -->
  <g transform="translate(708 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#DA3434"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">CMake</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">build system</text>
  </g>

