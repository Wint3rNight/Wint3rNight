    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">SPIR-V</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">shader ir</text>
  </g>

  <!-- Rust -->
  <g transform="translate(364 102)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#dea584"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Rust</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">systems</text>
  </g>

  <!-- Python -->
  <g transform="translate(536 102)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#3572A5"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Python</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">scripting · tools</text>
  </g>

  <!-- RenderDoc -->
  <g transform="translate(708 102)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#D91E18"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">RenderDoc</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">gpu debugger</text>
  </g>

  <!-- Git -->
  <g transform="translate(880 102)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#F05032"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Git</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">version control</text>
  </g>
