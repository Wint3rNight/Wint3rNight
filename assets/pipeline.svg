  <g transform="translate(880 16)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#FCC624"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">Linux</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">primary env</text>
  </g>

  <!-- ── row 2 ── -->

  <!-- OpenGL -->
  <g transform="translate(20 102)">
    <rect width="158" height="62" rx="7" fill="url(#cardGrad)" stroke="#4A3574" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#5586A4"/>
    <text x="79" y="30" font-size="14" font-weight="700" fill="#DADADA" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">OpenGL</text>
    <text x="79" y="50" font-size="11" fill="#8658E3" text-anchor="middle" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">graphics api</text>
