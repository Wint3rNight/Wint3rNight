<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 192" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="renderer boot sequence">
  <defs>
    <linearGradient id="caret-pulse" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8658E3"/>
      <stop offset="100%" stop-color="#5c35b0"/>
    </linearGradient>
  </defs>

  <!-- card background -->
  <rect x="0.5" y="0.5" width="1039" height="191" rx="10" fill="#1A1525" stroke="#47346E" stroke-width="1"/>

  <!-- title bar dots -->
  <circle cx="22" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="5" fill="#febc2e"/>
  <circle cx="58" cy="18" r="5" fill="#28c840"/>
  <text x="80" y="23" font-size="11" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#4A3574">renderer · boot sequence</text>

  <!-- separator -->
  <line x1="0" y1="34" x2="1040" y2="34" stroke="#47346E" stroke-width="0.6"/>

  <!-- ── Line 1  t=0.4s ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="0.4s" fill="freeze"/>
    <text x="24" y="62" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#8658E3">▶</text>
    <text x="44" y="62" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#DADADA">vulkan_init<tspan fill="#4A3574">()</tspan></text>
    <text x="44" y="77" font-size="11" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#5A5A6A">validation layers · VMA · swapchain</text>
    <text x="960" y="62" font-size="12" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#28c840" text-anchor="end">[ ok ]</text>
  </g>

  <!-- ── Line 2  t=1.1s ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="1.1s" fill="freeze"/>
    <text x="24" y="105" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#8658E3">▶</text>
    <text x="44" y="105" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#DADADA">compile_shaders<tspan fill="#4A3574">()</tspan></text>
    <text x="44" y="120" font-size="11" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#5A5A6A">glsl · hlsl  →  spir-v  ·  pipeline cache 176 KB</text>
    <text x="960" y="105" font-size="12" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#28c840" text-anchor="end">[ ok ]</text>
  </g>

  <!-- ── Line 3  t=1.8s ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="1.8s" fill="freeze"/>
    <text x="24" y="148" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#8658E3">▶</text>
    <text x="44" y="148" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#DADADA">build_pipeline<tspan fill="#4A3574">(</tspan><tspan fill="#aace60">deferred_pbr</tspan><tspan fill="#4A3574">)</tspan></text>
    <text x="44" y="163" font-size="11" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#5A5A6A">44 draw calls · IBL · SSAO · shadow maps</text>
    <text x="960" y="148" font-size="12" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#28c840" text-anchor="end">[ ok ]</text>
  </g>

  <!-- ── Line 4 (LIVE)  t=2.5s ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
    <text x="24" y="184" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#8658E3">▶</text>
    <text x="44" y="184" font-size="13" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#DADADA">renderer<tspan fill="#4A3574">::</tspan>run<tspan fill="#4A3574">()</tspan>
      <tspan fill="#5A5A6A" font-size="11">  227.7 fps · 1080p · RTX 3050 · 934 MiB VRAM</tspan>
    </text>
    <!-- LIVE badge pulsing -->
    <g>
      <rect x="922" y="172" width="52" height="18" rx="4" fill="#8658E3">
        <animate attributeName="opacity" values="1;0.45;1" dur="1.4s" begin="2.8s" repeatCount="indefinite"/>
      </rect>
      <text x="948" y="185" font-size="11" font-weight="700" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace" fill="#ffffff" text-anchor="middle">LIVE</text>
    </g>
  </g>

  <!-- blinking cursor before lines appear -->
  <rect x="24" y="50" width="7" height="14" rx="1" fill="#8658E3">
    <animate attributeName="opacity" values="1;0;1" dur="0.7s" begin="0s" end="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.1s" begin="2.5s" fill="freeze"/>
  </rect>
</svg>
