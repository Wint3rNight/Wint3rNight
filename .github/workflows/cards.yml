name: Rebuild Cards

on:
  schedule:
    - cron: "23 5 * * 1"   # weekly, Monday 05:23 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate featured + stats cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: python3 scripts/gen_cards.py

      - name: Regenerate activity flow chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: python3 scripts/gen_activity.py

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "build: refresh cards + activity"
          branch: main
          file_pattern: assets/featured-*.svg assets/stats.svg assets/activity.svg
